<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yudha Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;height:100vh;overflow:hidden;color:#fff;background:radial-gradient(circle at top,#0f172a,#020617);}

/* INTRO */
#intro{
    position:fixed;width:100%;height:100vh;display:flex;justify-content:center;align-items:center;z-index:10;transition:1s;
}
#intro.hide{opacity:0;pointer-events:none;}
#intro img{
    position:absolute;width:110%;height:110%;object-fit:cover;filter:blur(12px);z-index:0;animation:zoom 6s ease forwards;
}
#intro::after{
    content:'';position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1;
}
.title{position:relative;display:flex;font-size:36px;z-index:2;}
.yudha{opacity:0;animation:fadeIn 1.5s forwards;}
.project{
    margin-left:10px;transform:translateY(-200px);opacity:0;
    background:linear-gradient(90deg,#fff,#00eaff,#fff);
    background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 0 15px #00eaff;animation:drop 1s forwards,shine 2s forwards;
    animation-delay:1s,2s;
}
@keyframes fadeIn{to{opacity:1;}}
@keyframes drop{to{transform:translateY(0);opacity:1;}}
@keyframes shine{from{background-position:-100%;}to{background-position:200%;}}
@keyframes zoom{from{transform:scale(1);}to{transform:scale(1.1);}}

/* MAIN */
#main{position:fixed;width:100%;height:100vh;display:flex;justify-content:center;align-items:center;opacity:0;transition:1s;}
#main.show{opacity:1;}
.container{text-align:center;width:100%;max-width:350px;}
h1{margin-bottom:40px;}

/* GLASS ITEM */
.item{padding:20px;margin-bottom:20px;border-radius:25px;cursor:pointer;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.2);box-shadow:0 0 25px rgba(0,234,255,0.2);transition:0.3s;}
.item:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(0,234,255,0.5);}

/* POPUP PIN */
#popup{position:fixed;width:100%;height:100vh;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(15px);opacity:0;pointer-events:none;transition:0.3s;z-index:1000;}
#popup.active{opacity:1;pointer-events:auto;}
.popup-box{background:rgba(255,255,255,0.08);backdrop-filter:blur(25px);padding:2rem;border-radius:25px;text-align:center;border:1px solid rgba(255,255,255,0.2);box-shadow:inset 0 1px 2px rgba(255,255,255,0.3),0 20px 40px rgba(0,0,0,0.6);position:relative;overflow:hidden;}
.popup-box::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);transform:skewX(-20deg);}
.popup-box:hover::before{animation:shineMove 1s;}
@keyframes shineMove{from{left:-100%;}to{left:150%;}}
.dots{display:flex;justify-content:center;margin:15px 0;}
.dot{width:12px;height:12px;margin:0 6px;border-radius:50%;background:rgba(255,255,255,0.2);}
.dot.active{background:#00eaff;box-shadow:0 0 10px #00eaff,0 0 20px #00eaff;}
.keypad{display:grid;grid-template-columns:repeat(3,70px);gap:10px;justify-content:center;}
.key{height:60px;border-radius:50%;background:rgba(255,255,255,0.08);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.2);display:flex;justify-content:center;align-items:center;cursor:pointer;box-shadow:inset 0 1px 1px rgba(255,255,255,0.3),0 5px 15px rgba(0,0,0,0.5);position:relative;overflow:hidden;transition:0.2s;}
.key::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);transform:skewX(-20deg);}
.key:active::before{left:150%;transition:0.4s;}
.key:active{transform:scale(0.9);box-shadow:0 0 15px #00eaff,inset 0 1px 2px rgba(255,255,255,0.4);}
.check{font-size:50px;color:#00eaff;text-shadow:0 0 20px #00eaff;}
.error{animation:shake 0.4s;}
@keyframes shake{25%{transform:translateX(-8px);}50%{transform:translateX(8px);}75%{transform:translateX(-8px);}}

/* POPUP COMING SOON */
#coming-popup{position:fixed;width:100%;height:100vh;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(15px);opacity:0;pointer-events:none;transition:0.3s;z-index:1000;}
#coming-popup.active{opacity:1;pointer-events:auto;}
#coming-popup .popup-box{background:rgba(255,255,255,0.08);backdrop-filter:blur(25px);padding:2rem;border-radius:25px;text-align:center;border:1px solid rgba(255,255,255,0.2);box-shadow:inset 0 1px 2px rgba(255,255,255,0.3),0 20px 40px rgba(0,0,0,0.6);}
#coming-popup .popup-box button{margin-top:15px;padding:10px 20px;border:none;border-radius:15px;background:#00eaff;color:#fff;cursor:pointer;box-shadow:0 0 10px #00eaff;transition:0.3s;}
#coming-popup .popup-box button:hover{transform:scale(1.05);box-shadow:0 0 20px #00eaff;}

/* DEVICE NAME */
#device-name {
    position: fixed;
    top: 10px;
    left: 10px;
    background-color: rgba(0,0,0,0.6);
    color: #00eaff;
    padding: 5px 10px;
    border-radius: 5px;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    z-index: 9999;
}

/* LOADING POPUP */
#loading-popup{
    position:fixed;width:100%;height:100vh;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(15px);opacity:0;pointer-events:none;transition:0.3s;z-index:9999;
}
#loading-popup.active{opacity:1;pointer-events:auto;}
#loading-popup .popup-box{
    background:rgba(255,255,255,0.08);backdrop-filter:blur(25px);padding:2rem;border-radius:25px;text-align:center;border:1px solid rgba(255,255,255,0.2);box-shadow:inset 0 1px 2px rgba(255,255,255,0.3),0 20px 40px rgba(0,0,0,0.6);
}
#loading-popup .spinner{
    margin-top:15px;
    width:40px;
    height:40px;
    border:4px solid rgba(255,255,255,0.3);
    border-top-color:#00eaff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
#loading-popup button{
    margin:5px;
    padding:8px 16px;
    border:none;
    border-radius:15px;
    background:#00eaff;
    color:#fff;
    cursor:pointer;
    font-size:14px;
}
#loading-popup button:hover{transform:scale(1.05);box-shadow:0 0 20px #00eaff;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
    <img src="https://raw.githubusercontent.com/yudhaa-kasepp/Asset-ultah/main/IMG-20260322-WA0002.jpg">
    <div class="title">
        <span class="yudha">Yudha</span>
        <span class="project">Project</span>
    </div>
</div>

<!-- MAIN -->
<div id="main">
    <div class="container">
        <h1>pilih </h1>
        <div class="item" onclick="openLock()">Drive foto foto hiling🍃🍃</div>
        <div class="item" onclick="go('https://yudhaa-kasepp.github.io/ulang-tahun-naylaaaaa17/')">🎂 Ultah naylaa</div>
        <div class="item" onclick="comingSoon()">🚀Teknoga 19</div>
    </div>
</div>

<!-- POPUP PIN -->
<div id="popup">
    <div class="popup-box">
        <h3>Masukkan PIN</h3>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="press(1)">1</div>
            <div class="key" onclick="press(2)">2</div>
            <div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div>
            <div class="key" onclick="press(5)">5</div>
            <div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div>
            <div class="key" onclick="press(8)">8</div>
            <div class="key" onclick="press(9)">9</div>
            <div class="key" onclick="resetPin()">⌫</div>
            <div class="key" onclick="press(0)">0</div>
            <div class="key" onclick="cancelPin()">kembali</div>
        </div>
    </div>
</div>

<!-- POPUP COMING SOON -->
<div id="coming-popup">
    <div class="popup-box">
        <h3>Coming Soon</h3>
        <button onclick="closeComing()">Tutup</button>
    </div>
</div>

<!-- DEVICE NAME -->
<div id="device-name"></div>

<!-- LOADING POPUP -->
<div id="loading-popup">
    <div class="popup-box">
        <h3 id="loading-text">Menghubungkan ke google drive...</h3>
        <div class="spinner"></div>
    </div>
</div>

<script>
const intro = document.getElementById("intro");
const main = document.getElementById("main");
const popup = document.getElementById("popup");
const comingPopup = document.getElementById("coming-popup");
const PIN="2203";
let input="";

window.addEventListener("load",()=>{
    setTimeout(()=>{
        intro.classList.add("hide");
        setTimeout(()=>main.classList.add("show"),500);
    },3500);

    document.getElementById("device-name").innerText = getDeviceFullName();
});

function go(link){window.location.href=link;}
function openLock(){popup.classList.add("active");}
function comingSoon(){comingPopup.classList.add("active");}
function closeComing(){comingPopup.classList.remove("active");}

function press(num){
    if(input.length<4){input+=num;updateDots();}
    if(input.length===4){checkPin();}
}
function updateDots(){
    document.querySelectorAll(".dot").forEach((d,i)=>{d.classList.toggle("active",i<input.length);});
}
function resetPin(){input="";updateDots();}
function cancelPin(){input="";updateDots();popup.classList.remove("active");}

function checkPin(){
    let box=document.querySelector("#popup .popup-box");
    if(input===PIN){
        box.innerHTML=`<div class="check">✔</div><h3>Akses Diterima</h3>`;
        setTimeout(()=>{
            showLoading("https://drive.google.com/drive/folders/1Yxi3sGgZib4BCkYMj-uMBLTCSHmklu52"); // ganti nanti
        },1200);
    }else{
        box.classList.add("error");
        setTimeout(()=>{box.classList.remove("error");resetPin();},400);
    }
}

function showLoading(link){
    popup.classList.remove("active");
    const loading = document.getElementById("loading-popup");
    loading.classList.add("active");
    
    const box = loading.querySelector(".popup-box");
    const isAndroid = /Android/i.test(navigator.userAgent);
    
    box.innerHTML = `<h3 id="loading-text">Menghubungkan...</h3><div class="spinner"></div>`;
    
    setTimeout(()=>{
        const text = document.getElementById("loading-text");
        if(text) text.innerText = "Terhubung ke server...";
    },1000);
    
    setTimeout(()=>{
        if(isAndroid){
            box.innerHTML += `<div style="margin-top:15px;">
                <button onclick="openDrive('${link}','browser')">Browser</button>
                <button onclick="openDrive('${link}','app')">Aplikasi</button>
            </div>`;
        }else{
            window.location.href = link;
        }
    },2000);
}

function openDrive(link, mode){
    if(mode === "app"){
        const intentLink = `intent://${link.replace("https://","")}#Intent;package=com.google.android.apps.docs;scheme=https;end`;
        window.location.href = intentLink;
    }else{
        window.location.href = link;
    }
}

function getDeviceFullName() {
    const ua = navigator.userAgent;
    if (/iPhone/i.test(ua)) return "Apple iPhone";
    if (/iPad/i.test(ua)) return "Apple iPad";
    if (/Samsung/i.test(ua)) {
        const match = ua.match(/SM-[A-Z0-9]+/i);
        return match ? `Samsung Galaxy ${match[0].replace("SM-", "")}` : "Samsung Galaxy";
    }
    if (/Redmi/i.test(ua)) {
        const match = ua.match(/Redmi\s[A-Z0-9 ]+/i);
        return match ? match[0] : "Xiaomi Redmi";
    }
    if (/Mi\s/i.test(ua)) {
        const match = ua.match(/Mi\s[A-Z0-9 ]+/i);
        return match ? match[0] : "Xiaomi Mi";
    }
    if (/OPPO/i.test(ua)) {
        const match = ua.match(/OPPO\s[A-Z0-9 ]+/i);
        return match ? match[0] : "OPPO";
    }
    if (/Vivo/i.test(ua)) {
        const match = ua.match(/Vivo\s[A-Z0-9 ]+/i);
        return match ? match[0] : "Vivo";
    }
    if (/Huawei/i.test(ua)) {
        const match = ua.match(/Huawei\s[A-Z0-9 ]+/i);
        return match ? match[0] : "Huawei";
    }
    if (/Android/i.test(ua)) return "Android";
    if (/Macintosh/i.test(ua)) return "Mac";
    if (/Windows/i.test(ua)) return "Windows";
    return "Device";
}
</script>
</body>
</html>
